<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#378add">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="성경고사">
<meta name="description" content="성경고사 문제은행 400문항 퀴즈 앱 — 구약 200 + 신약 200">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>성경고사 문제은행</title>
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  --surface-0: #f5f5f4;
  --surface-1: #eeede9;
  --surface-2: #ffffff;
  --border: rgba(0,0,0,0.10);
  --border-strong: rgba(0,0,0,0.20);
  --text-primary: #1c1c1a;
  --text-secondary: #5f5e5a;
  --text-muted: #888780;
  --bg-accent: #e6f1fb;
  --border-accent: #85b7eb;
  --text-accent: #185fa5;
  --fill-accent: #378add;
  --on-accent: #ffffff;
  --bg-success: #eaf3de;
  --border-success: #97c459;
  --text-success: #3b6d11;
  --bg-danger: #fcebeb;
  --border-danger: #f09595;
  --text-danger: #a32d2d;
  --bg-warning: #faeeda;
  --text-warning: #854f0b;
  --radius: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-0: #1c1c1a;
    --surface-1: #2c2c2a;
    --surface-2: #3a3a38;
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.20);
    --text-primary: #f1efe8;
    --text-secondary: #b4b2a9;
    --text-muted: #888780;
    --bg-accent: #042c53;
    --border-accent: #185fa5;
    --text-accent: #85b7eb;
    --fill-accent: #378add;
    --on-accent: #ffffff;
    --bg-success: #173404;
    --border-success: #3b6d11;
    --text-success: #97c459;
    --bg-danger: #501313;
    --border-danger: #a32d2d;
    --text-danger: #f09595;
    --bg-warning: #412402;
    --text-warning: #ef9f27;
  }
}
html, body { margin: 0; padding: 0; background: var(--surface-0); min-height: 100vh; }

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
#app{min-height:100vh;padding:0;max-width:480px;margin:0 auto}

/* Start screen */
#start-screen{padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1rem}
.logo{text-align:center;padding:1.5rem 0 1rem}
.logo-icon{font-size:40px;margin-bottom:8px}
.logo h1{font-size:20px;font-weight:500;color:var(--text-primary)}
.logo p{font-size:13px;color:var(--text-muted);margin-top:4px}
.mode-card{background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s,border-color 0.15s;-webkit-tap-highlight-color:transparent}
.mode-card:active{background:var(--surface-0);border-color:var(--border-strong)}
.mode-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mode-icon.seq{background:var(--bg-accent)}
.mode-icon.rnd{background:var(--bg-warning)}
.mode-label{font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:2px}
.mode-desc{font-size:12px;color:var(--text-secondary)}
.divider{text-align:center;font-size:12px;color:var(--text-muted);margin:4px 0}

/* Quiz screen */
#quiz-screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
.q-header{padding:0.75rem 1rem;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--surface-2)}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.progress-bar{height:4px;background:var(--surface-1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--fill-accent);border-radius:2px;transition:width 0.3s}
.q-counts{display:flex;gap:8px;font-size:12px;color:var(--text-secondary)}
.cnt-ok{color:var(--text-success)}
.cnt-no{color:var(--text-danger)}
.q-num{font-size:12px;color:var(--text-muted)}
.q-body{flex:1;overflow-y:auto;padding:1rem;-webkit-overflow-scrolling:touch}
.sec-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-bottom:8px;font-weight:500}
.sec-badge.OT{background:var(--bg-warning);color:var(--text-warning)}
.sec-badge.NT{background:var(--bg-accent);color:var(--text-accent)}
.q-text{font-size:15px;color:var(--text-primary);line-height:1.65;margin-bottom:1rem;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt-btn{background:var(--surface-1);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text-primary);text-align:left;cursor:pointer;transition:background 0.12s;line-height:1.5;width:100%;-webkit-tap-highlight-color:transparent;display:flex;align-items:flex-start;gap:10px}
.opt-btn:active:not(:disabled){background:var(--surface-0)}
.opt-letter{width:22px;height:22px;border-radius:50%;background:var(--surface-0);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px;color:var(--text-secondary)}
.opt-btn.correct .opt-letter{background:var(--bg-success);border-color:var(--border-success);color:var(--text-success)}
.opt-btn.wrong .opt-letter{background:var(--bg-danger);border-color:var(--border-danger);color:var(--text-danger)}
.opt-btn.reveal .opt-letter{background:var(--bg-success);border-color:var(--border-success);color:var(--text-success);opacity:0.6}
.opt-btn.correct{background:var(--bg-success);border-color:var(--border-success);color:var(--text-success)}
.opt-btn.wrong{background:var(--bg-danger);border-color:var(--border-danger);color:var(--text-danger)}
.opt-btn.reveal{background:var(--bg-success);border-color:var(--border-success);color:var(--text-success);opacity:0.6}
.feedback-box{border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.5;margin-bottom:0.75rem;display:none}
.feedback-box.show{display:block}
.feedback-box.ok{background:var(--bg-success);color:var(--text-success);border:0.5px solid var(--border-success)}
.feedback-box.no{background:var(--bg-danger);color:var(--text-danger);border:0.5px solid var(--border-danger)}
.q-footer{padding:0.75rem 1rem;border-top:0.5px solid var(--border);flex-shrink:0;background:var(--surface-2);display:flex;gap:8px}
.btn-next{flex:1;background:var(--fill-accent);color:var(--on-accent);border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:500;cursor:pointer;display:none;-webkit-tap-highlight-color:transparent}
.btn-next.show{display:block}
.btn-quit{background:transparent;border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:14px;color:var(--text-secondary);cursor:pointer;-webkit-tap-highlight-color:transparent}

/* Result screen */
#result-screen{display:none;padding:1.5rem 1rem;text-align:center}
.result-title{font-size:22px;font-weight:500;margin-bottom:4px;color:var(--text-primary)}
.result-sub{font-size:13px;color:var(--text-secondary);margin-bottom:1.5rem}
.score-ring{width:110px;height:110px;margin:0 auto 1.5rem;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-pct{font-size:24px;font-weight:500;color:var(--text-primary)}
.score-lbl{font-size:10px;color:var(--text-muted)}
.stats-row{display:flex;gap:8px;margin-bottom:1.5rem}
.stat-card{flex:1;background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.stat-n{font-size:22px;font-weight:500}
.stat-l{font-size:11px;color:var(--text-muted);margin-top:2px}
.n-total{color:var(--text-primary)}
.n-ok{color:var(--text-success)}
.n-no{color:var(--text-danger)}
.result-btns{display:flex;flex-direction:column;gap:8px}
.btn-retry-wrong{background:var(--fill-accent);color:var(--on-accent);border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent}
.btn-restart{background:var(--surface-1);border:0.5px solid var(--border);border-radius:10px;padding:14px;font-size:14px;color:var(--text-secondary);cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent}
.btn-retry-wrong:disabled{opacity:0.5;cursor:default}

</style>
</head>
<body>


<div id="app">
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">성경고사 400문항 인터랙티브 퀴즈</h2>

<!-- Start -->
<div id="start-screen">
<div id="resume-banner" style="display:none;background:var(--bg-accent);border:0.5px solid var(--border-accent);border-radius:12px;padding:1rem 1.25rem;flex-direction:column;gap:10px">
  <div style="font-size:14px;font-weight:500;color:var(--text-accent)">이어서 풀기</div>
  <div id="resume-info" style="font-size:12px;color:var(--text-secondary)"></div>
  <div style="display:flex;gap:8px">
    <button onclick="resumeQuiz(document.getElementById('resume-banner')._saved)" style="flex:1;background:var(--fill-accent);color:var(--on-accent);border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:500;cursor:pointer">이어서 풀기</button>
    <button onclick="clearSave();checkResume()" style="background:transparent;border:0.5px solid var(--border-strong);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text-secondary);cursor:pointer">처음부터</button>
  </div>
</div>

  <div class="logo">
    <div class="logo-icon">✝️</div>
    <h1>성경고사 문제은행</h1>
    <p>구약 200문항 · 신약 200문항</p>
  </div>
  <p style="font-size:13px;color:var(--text-secondary);text-align:center;margin-top:-4px">출제 방식을 선택하세요</p>
  <div class="mode-card" onclick="startQuiz('seq')">
    <div class="mode-icon seq"><i class="ti ti-list-numbers" aria-hidden="true"></i></div>
    <div>
      <div class="mode-label">순서대로 풀기</div>
      <div class="mode-desc">구약 1번부터 신약 200번까지 순서대로</div>
    </div>
  </div>
  <div class="divider">또는</div>
  <div class="mode-card" onclick="startQuiz('rnd')">
    <div class="mode-icon rnd"><i class="ti ti-shuffle" aria-hidden="true"></i></div>
    <div>
      <div class="mode-label">무작위로 풀기</div>
      <div class="mode-desc">400문항을 무작위 순서로</div>
    </div>
  </div>
</div>

<!-- Quiz -->
<div id="quiz-screen">
  <div class="q-header">
    <div class="header-row">
      <div class="q-num" id="q-num">1 / 400</div>
      <div class="q-counts">
        <span class="cnt-ok">✓ <b id="cnt-ok">0</b></span>
        <span class="cnt-no">✗ <b id="cnt-no">0</b></span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  </div>
  <div class="q-body" id="q-body">
    <span class="sec-badge" id="sec-badge">OT</span>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback-box" id="feedback"></div>
  </div>
  <div class="q-footer">
    <button class="btn-quit" onclick="endEarly()">종료</button>
    <button class="btn-next show" id="btn-next" onclick="nextQ()" style="display:none">다음 문제 →</button>
  </div>
</div>

<!-- Result -->
<div id="result-screen">
  <div class="result-title" id="res-title">완료!</div>
  <div class="result-sub" id="res-sub"></div>
  <div class="score-ring">
    <svg width="110" height="110" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="46" fill="none" stroke="var(--surface-1)" stroke-width="10"/>
      <circle cx="55" cy="55" r="46" fill="none" stroke="var(--fill-accent)" stroke-width="10"
        stroke-linecap="round" stroke-dasharray="289" id="ring-arc" stroke-dashoffset="289"/>
    </svg>
    <div class="score-text">
      <div class="score-pct" id="pct-text">0%</div>
      <div class="score-lbl">정답률</div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-n n-total" id="r-total">0</div><div class="stat-l">총 문항</div></div>
    <div class="stat-card"><div class="stat-n n-ok" id="r-ok">0</div><div class="stat-l">정답</div></div>
    <div class="stat-card"><div class="stat-n n-no" id="r-no">0</div><div class="stat-l">오답</div></div>
  </div>
  <div class="result-btns">
    <button class="btn-retry-wrong" id="btn-retry-wrong" onclick="retryWrong()">오답만 다시 풀기</button>
    <button class="btn-restart" onclick="restart()">처음부터 다시 시작</button>
  </div>
</div>
</div>


<script>

const SAVE_KEY = 'bibleQuizSave';

function saveState() {
  if (isRetry) return;
  const state = {
    mode: queue === ALL ? 'seq' : 'rnd',
    queueIds: queue.map(q => ALL.indexOf(q)),
    qIdx,
    okArr: [...okSet],
    noArr: [...noSet]
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e) {}
}

function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s.queueIds || !Array.isArray(s.queueIds)) return null;
    return s;
  } catch(e) { return null; }
}

function resumeQuiz(s) {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'flex';
  queue = s.queueIds.map(i => ALL[i]);
  qIdx = s.qIdx;
  okSet = new Set(s.okArr);
  noSet = new Set(s.noArr);
  answered = false;
  isRetry = false;
  renderQ();
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(r => console.log('SW registered')).catch(e => console.log('SW error', e));
  });
}


const OT=[
{q:"다음에서 창세기 1장의 창조기사 내용 중 틀린 것은?",o:["첫째 날 – 빛을 창조하시고 빛과 어둠을 나누심","둘째 날 - 물을 위아래로 나누어 궁창을 만드심","넷째 날 - 하늘의 궁창에 광명체(해,달,별)를 만드심","다섯째 날 – 땅의 생물들을 종류대로 만드심"],a:3},
{q:"하나님의 천지창조 중 넷째 날에 해당되는 것은?",o:["궁창","해와 달과 별","육지와 바다","바다 생물과 공중의 새"],a:1},
{q:"창세기에서 '생육하고 번성하라'는 명령이나 예언, 또는 축복이 나오지 않는 장은?",o:["창 8장","창 9장","창 22장","창 35장"],a:2},
{q:"여자의 후손이 뱀의 머리를 상하게 할 것이라는 원시 복음이 나타난 구절은?",o:["창 1:15","창 2:15","창 3:15","창 4:15"],a:2},
{q:"가인과 아벨에 관한 내용 중 틀린 것은?",o:["가인은 농사하는 자였고, 아벨은 양 치는 자였다.","아벨은 양의 첫 새끼를 여호와께 제물로 드렸다.","하나님은 아벨을 죽인 가인에게 이방 땅에 정착하는 벌을 내리셨다.","가인은 성을 쌓고 아들의 이름을 따서 에녹이라 불렀다."],a:2},
{q:"하나님께서 가인이 죽인 아벨 대신에 아담에게 주신 아들의 이름은?",o:["에노스","셋","에녹","유발"],a:1},
{q:"가인이 에덴의 동쪽에서 아내와 동침하여 낳은 아들의 이름은?",o:["에녹","셋","므후야엘","라멕"],a:0},
{q:"에녹은 65세에 므두셀라를 낳은 후 하나님과 몇 년을 동행하였는가?",o:["100년","200년","300년","400년"],a:2},
{q:"하나님과 동행하다가 육신 그대로 승천한 사람은?",o:["라멕","노아","므두셀라","에녹"],a:3},
{q:"노아의 홍수 때 부정한 짐승은 암수 몇 쌍을 태웠는가?",o:["1쌍","2쌍","3쌍","7쌍"],a:1},
{q:"노아가 600세 되던 해에 홍수가 땅을 덮었다. 비는 며칠간 내렸는가?",o:["40일","70일","100일","365일"],a:0},
{q:"아브람이 조카 롯을 구하러 끌고 나간 훈련된 사람들은 몇 명인가?",o:["316명","317명","318명","319명"],a:2},
{q:"아브람이 그돌라오멜을 무찌르고 돌아왔을 때 떡과 포도주를 가지고 나와 축복한 사람은?",o:["아리옥","베라","살렘","멜기세덱"],a:3},
{q:"아브라함이 헷 사람 에브론에게 사서 매장지로 삼은 밭의 지명은?",o:["압둘람","막벨라","세겜","에브랏"],a:1},
{q:"이삭의 아내 이름은?",o:["레아","라헬","리브가","하갈"],a:2},
{q:"야곱과 레아 사이에 태어난 아들이 아닌 사람은?",o:["베냐민","레위","유다","스불론"],a:0},
{q:"야곱이 '규가 너를 떠나지 아니하며…'로 축복한 아들은?",o:["르우벤","시므온","유다","베냐민"],a:2},
{q:"형제들이 요셉을 죽이려 할 때 그의 생명을 해치지 말자고 말한 형제는?",o:["르우벤","시므온","레위","베냐민"],a:0},
{q:"'두려워하지 마소서 내가 하나님을 대신하리이까…오늘과 같이 많은 백성의 생명을 구원하게 하시려 하셨나니'라고 한 인물은?",o:["아브라함","요셉","모세","여호수아"],a:1},
{q:"이스라엘 자손이 애굽에서 나올 때 모세는 누구의 유골을 가지고 나왔는가?",o:["아브라함","이삭","야곱","요셉"],a:3},

{q:"예레미야서 안의 말씀이 아닌 것은?",o:["이 모든 땅이 폐허가 되어…이 민족들은 칠십 년 동안 바벨론의 왕을 섬기리라","이에 토지가 황폐하여 땅이 안식년을 누림 같이 안식하여 칠십 년을 지냈으니","너는 내 손에서 이 진노의 술잔을 받아가지고 내가 너를 보내는 바 그 모든 나라로 하여금 마시게 하라","칠십 년이 끝나면 내가 바벨론의 왕과 그의 나라와 갈대아인의 땅을 그 죄악으로 말미암아 벌하여…"],a:1},
{q:"예레미야서와 관련된 설명 중 맞지 않는 것은?",o:["예레미야 선지자가 활동하던 정황은 남유다가 몰락하던 쇠퇴기였다.","예레미야가 성전 문 앞에서 백성의 예배와 삶의 괴리와 반역을 책망한 단 한 번의 선포는 위험한 사역이었다.","예레미야의 예언은 언약 백성이 하나님의 심판으로 겪을 고통들을 선포했으며 그의 고향 사람들과 가족들까지 그에게 적대적이었다.","예레미야는 도살 당하러 끌려가는 순한 어린 양과 같은 자신을 자신의 대적들이 해하려고 꾀하는 현실에 고민하며 기도했다."],a:1},
{q:"선지자 예레미야서의 말씀으로 맞는 것은?",o:["너는 그들에게 이르기를 주 여호와의 말씀이 이러하시다 하라 들을 자는 들을 것이요 듣기 싫은 자는 듣지 아니하리니…","여호와의 분노가 내게 가득하여 참기 어렵도다…남편과 아내와 나이 든 사람과 늙은이가 다 잡히리로다","그 날에 네가 말하기를 여호와여 주께서 전에는 내게 노하셨사오나 이제는 주의 진노가 돌아섰고…","어떤 사람이 너희에게 말하기를 주절거리며 속살거리는 신접한 자와 마술사에게 물으라 하거든…백성이 자기 하나님께 구할 것이 아니냐…"],a:1},
{q:"에스겔서에 들어 있는 말씀이 아닌 것은?",o:["너는 예루살렘 성읍 중에 순행하여…탄식하며 우는 자의 이마에 표를 그리라","내가 네게 이르는 말을 듣고…네 입을 벌리고 내가 네게 주는 것을 먹으라","이스라엘의 하나님 여호와께서 이같이 내게 이르시되 너는 내 손에서 이 진노의 술잔을 받아가지고…","네 마음이 하나님의 마음 같은 체할지라도 너는 사람이요 신이 아니거늘 네가 다니엘보다 지혜로워서…"],a:2},
{q:"에스겔이 본 환상의 내용이 아닌 것은?",o:["그 사방 광채의 모양은 비 오는 날 구름에 있는 무지개 같으니 이는 여호와의 영광의 형상의 모양이라…","그 날에 생수가 예루살렘에서 솟아나서 절반은 동해로, 절반은 서해로 흐를 것이라…","너는 예루살렘 성읍 중에 순행하여…탄식하며 우는 자의 이마에 표를 그리라","그가 나를 데리고 성전 문에 이르시니…그 문지방 밑에서 물이 나와 동쪽으로 흐르다가 성전 오른쪽 제단 남쪽으로 흘러 내리더라"],a:1},
{q:"의로운 종에 대한 이사야의 예언 말씀이 아닌 것은?",o:["그는 쇠하지 아니하며 낙담하지 아니하고 세상에 정의를 세우기에 이르리니…","내 입을 날카로운 칼 같이 만드시고…","나를 의롭다 하시는 이가 가까이 계시니…","나는 끌려서 도살 당하러 가는 순한 어린 양과 같으므로 그들이 나를 해하려고 꾀하기를…"],a:3},
{q:"예레미야의 고백에 해당하는 말씀이 아닌 것은?",o:["여호와여 내가 주와 변론할 때에는 주께서 의로우시니이다…악한 자의 길이 형통하며…","밤에는 슬피 우니 눈물이 뺨에 흐름이여…친구들도 다 배반하여 원수들이 되었도다","나는 목자의 직분에서 물러가지 아니하고 주를 따랐사오며…","내가 기뻐하는 자의 모임 가운데 앉지 아니하며 즐거워하지도 아니하고…"],a:1},
{q:"성전에 대한 에스겔의 예언 말씀이 아닌 것은?",o:["그들이 자녀를 죽여 그 우상에게 드린 그 날에 내 성소에 들어와서 더럽혔으되…","여호와의 성전 문 곧 현관과 제단 사이에서 약 스물다섯 명이…낯을 동쪽으로 향하여 동쪽 태양에게 예배하더라","내가 너희에게 나의 종 선지자들을 꾸준히 보내 그들의 말을 순종하라고 하였으나…내가 이 성전을 실로 같이 되게 하고","성전의 앞면이 동쪽을 향하였는데 그 문지방 밑에서 물이 나와 동쪽으로 흐르다가…"],a:2},
{q:"에스겔만 언급하는 민족 이름은?",o:["시돈","두발","루딤","도갈마"],a:1},
{q:"에스겔서에 인용된 당시 속담이 아닌 것은?",o:["구스인이 그의 피부를, 표범이 그의 반점을 변하게 할 수 있느냐","날이 더디고 모든 묵시가 사라지리라","어머니가 그러하면 딸도 그러하다","아버지가 신 포도를 먹었으므로 그의 아들의 이가 시다"],a:0},
{q:"우상숭배를 책망하는 에스겔서의 말씀은?",o:["조각한 우상을 의지하며…너희는 우리의 신이라 하는 자는 물리침을 받아 크게 수치를 당하리라","내가 네가 새긴 우상과 주상을 너희 가운데에서 멸절하리니…","우상을 마음에 들이며 죄악의 걸림돌을 자기 앞에 두고 선지자에게로 가는 모든 자에게…","너희가 너희 왕 식굿과 기윤과 너희 우상들과…너희를 위하여 만든 신들의 별 형상을 지고 가리라…"],a:2},
{q:"두로에 대한 에스겔서의 말씀은?",o:["면류관을 씌우던 자요 그 상인들은 고관들이요…두로에 대하여 누가 이 일을 정하였느냐","두로의 서너 가지 죄로 말미암아 내가 그 벌을 돌이키지 아니하리니…","두로는 자기를 위하여 요새를 건축하며 은을 티끌 같이, 금을 거리의 진흙 같이 쌓았도다…","두로야 네가 말하기를 나는 온전히 아름답다 하였도다…"],a:3},
{q:"에스겔의 예언 말씀을 찾으시오. (측량하는 장면 중)",o:["내가 또 눈을 들어 본즉 한 사람이 측량줄을 그의 손에 잡았기로…예루살렘을 측량하여… (겔 44:1-2)","나를 데리시고 거기에 이르시니 모양이 놋 같이 빛난 사람 하나가 손에 삼줄과 측량하는 장대를 가지고 문에 서 있더니 (겔 40:3)","내가 불쌍히 여기므로 예루살렘에 돌아왔은즉 내 집이 그 가운데에 건축되리니…(겔 43:5)","그 날에 생수가 예루살렘에서 솟아나서…(겔 47:8)"],a:1},
{q:"다니엘 7장의 예언 말씀 중 그 가리키는 대상이 나머지 셋과 다른 하나는?",o:["그 등에는 새의 날개 넷이 있고 그 짐승에게 또 머리 넷이 있으며 권세를 받았더라","이는 쇠요 그 발톱은 놋이니 먹고 부서뜨리고 나머지는 발로 밟았으며","그것의 머리에는 열 뿔이 있고 그 외에 또 다른 뿔이 나오매","모든 백성과 나라들과 다른 언어를 말하는 모든 자들이 그를 섬기게 하였으니"],a:3},
{q:"다니엘서에 등장하는 왕들의 발언들 중 발언자가 나머지 셋과 다른 하나는?",o:["너희 하나님은 참으로 모든 신들의 신이시오 모든 왕의 주재시로다","내가 지극히 높으신 이에게 감사하며…그 권세는 영원한 권세요 그 나라는 대대에 이르리로다","그는 살아 계시는 하나님이시요 영원히 변하지 않으실 이시며…","땅의 모든 사람들을 없는 것 같이 여기시며 하늘의 군대에게든지 땅의 사람에게든지 그는 자기 뜻대로 행하시나니"],a:2},
{q:"다니엘서의 말씀 속 '백성 중에 지혜로운 자들이 (A)을 가르칠 것이나 그들이 (B)과 (C)과 사로잡힘과 (D)을 당하여…'에서 빈칸이 맞는 것은?",o:["A: 많은 무리, B: 불꽃, C: 칼날, D: 약탈, E: 거짓말, F: 고난, G: 연단","A: 많은 사람, B: 칼날, C: 불꽃, D: 약탈, E: 속임수 F: 연단, G: 정결하게","A: 많은 사람, B: 약탈, C: 칼날, D: 불꽃, E: 뇌물, F: 택하심, G: 거룩하게","A: 가난한 자들, B: 칼날, C: 약탈, D: 불꽃, E: 궤휼, F: 보내심, G: 연단"],a:1},
{q:"다니엘 12:2 '땅의 (A) 가운데에서 자는 자 중에서 (B)은 깨어나 (C)을 받는 자도 있겠고 (D)을 당하여서 영원히 (E)을 당할 자도 있을 것이며…'에서 빈칸이 맞는 것은?",o:["A: 잠든 이들, B: 모든 사람, C: 영생, D: 영벌, E: 고통, F: 하늘, G: 하나님께로, H: 영화롭게","A: 티끌, B: 많은 사람, C: 영생, D: 수치, E: 부끄러움, F: 궁창, G: 옳은 데로, H: 영원토록","A: 기초, B: 의인들, C: 영생, D: 수치, E: 영벌, F: 공중, G: 죄에서, H: 영원토록","A: 깊음, B: 구속된 이들, C: 영생, D: 부끄러움, E: 수치, F: 궁창, G: 온전히, H: 영원토록"],a:1},
{q:"다니엘 2장 '(A) 돌이 나와서 신상의 쇠와 진흙의 발을 쳐서 부서뜨리매…우상을 친 돌은 (C)을 이루어 (D)에 가득하였나이다…이 여러 왕들의 시대에 하늘의 하나님이 한 (F)을 세우시리니…'에서 빈칸이 맞는 것은?",o:["A: 손대지 아니한, B: 타작 틀, C: 뜻, D: 온 땅, E: 나라, F: 왕국, G: 왕좌, H: 굳건히","A: 하나님 앞에서, B: 바람, C: 징벌, D: 바다, E: 세상, F: 나라, G: 홀, H: 여호와 앞에","A: 손대지 아니한, B: 타작 마당, C: 태산, D: 온 세계, E: 민족, F: 나라, G: 국권, H: 영원히","A: 다듬지 아니한, B: 추수 들판, C: 이치, D: 온 산, E: 나라, F: 왕국, G: 보좌, H: 홀로"],a:2},
{q:"호세아와 고멜의 결혼 생활 중 여호와가 이스라엘에게 약속하신 말씀이 아닌 것은?",o:["내가 유다 족속을 긍휼히 여겨 그들의 하나님 여호와로 구원하겠고 활과 칼이나 전쟁이나 말과 마병으로 구원하지 아니하리라","거기서 비로소 그의 포도원을 그에게 주고 아골 골짜기로 소망의 문을 삼아 주리니…","그 후에 이스라엘 자손이 돌아와서 그들의 하나님 여호와와 그들의 왕 다윗을 찾고…","너는 말씀을 가지고 여호와께로 돌아와서 아뢰기를 모든 불의를 제거하시고…우리가 수송아지를 대신하여 입술의 열매를 주께 드리리이다"],a:3},
{q:"호세아서 6장 '그러므로 우리가 여호와를 알자…그의 나타나심은 (A) 같이 어김없나니…너희의 (B)은/는/이/가 (C)이나 쉬 없어지는 (D) 같도다…내가 (E) 그들을 치고…내 (F)은 (G)처럼 나오느니라'에서 빈칸이 맞는 것은?",o:["A: 새벽, B: 인애, C: 이슬, D: 안개, E: 재앙으로, F: 교훈, G: 치료의 빛","A: 새벽 빛, B: 인애, C: 아침 구름, D: 이슬, E: 선지자들로, F: 심판, G: 빛","A: 아침 빛, B: 공의, C: 풀꽃, D: 구름, E: 선지자들로, F: 교훈, G: 빛","A: 새벽, B: 사랑, C: 아침 구름, D: 이슬, E: 재앙으로, F: 심판, G: 광명"],a:1},
{q:"선지자 호세아의 말씀이 아닌 것은?",o:["내가 이스라엘에게 이슬과 같으리니 그가 백합화 같이 피겠고… (호 14:5)","누가 지혜가 있어 이런 일을 깨달으며…여호와의 도는 정직하니 의인은 그 길로 다니거니와… (호 14:9)","너희는 여호와를 찾으라 그리하면 살리라…벧엘에서 그 불들을 끌 자가 없으리라 (호 6:5)","형벌의 날이 이르렀고 보응의 날이 온 것을 이스라엘이 알지라… (호 9:7)"],a:2},
{q:"선지자 호세아의 예언은?",o:["네가 많은 무리와 행음하고서도 내게로 돌아오려느냐…(호 2:3)","그들은 아담처럼 언약을 어기고 거기에서 나를 반역하였느니라 (호 6:7)","내게 배역한 이스라엘이 간음을 행하였으므로 내가 그를 내쫓고 그에게 이혼서까지 주었으되…(호 2:7)","내가 또 이르노니 야곱의 우두머리들과 이스라엘 족속의 통치자들아 들으라 (호 8:1)"],a:1},
{q:"요엘의 예언 말씀이 아닌 것은?",o:["네 방백은 메뚜기 같고 너의 장수들은 큰 메뚜기 떼가 추운 날에는 울타리에 깃들였다가… (욜 1:15)","팥중이가 남긴 것을 메뚜기가 먹고 메뚜기가 남긴 것을 느치가 먹고… (욜 1:4)","내가 전에 너희에게 보낸 큰 군대 곧 메뚜기와 느치와 황충과 팥중이가 먹은 햇수대로 너희에게 갚아 주리니 (욜 2:25)","불이 그들의 앞을 사르며 불꽃이 그들의 뒤를 태우니… (욜 2:3)"],a:0},
{q:"여호와의 날에 대한 요엘의 말씀이 아닌 것은?",o:["시온에서 나팔을 불며 나의 거룩한 산에서 경고의 소리를 질러… (욜 2:1)","사람이 많음이여, 심판의 골짜기에…여호와의 날이 가까움이로다 (욜 3:14)","보라 여호와의 날 곧 잔혹히 분냄과 맹렬히 노하는 날이 이르러 땅을 황폐하게 하며… (욜 3:9)","여호와께서 그의 군대 앞에서 소리를 지르시고…여호와의 날이 크고 심히 두렵도다 (욜 2:11)"],a:2},
{q:"요엘 3:16-18 '여호와께서 시온에서 부르짖고…하늘과 땅이 (A)…그 날에 산들이 (E)을 떨어뜨릴 것이며 작은 산들이 (F)을 흘릴 것이며…여호와의 (H)에서 (I)이 흘러 나와서 싯딤 골짜기에 대리라'에서 빈칸이 맞는 것은?",o:["A: 어두워지리로다, B: 반석, C: 산성, D: 보좌, E: 이슬, F: 꿀, G: 생수, H: 영광, I: 하수","A: 갈라지리로다, B: 소망, C: 능력, D: 성소, E: 젖, F: 단 포도주, G: 꿀, H: 앞, I: 물","A: 진동하리로다, B: 피난처, C: 산성, D: 성산, E: 단 포도주, F: 젖, G: 물, H: 성전, I: 샘","A: 떠나가리로다, B: 산성, C: 피난처, D: 성산, E: 젖, F: 이슬, G: 물, H: 성전, I: 샘"],a:2},
{q:"요엘 2:28,32, 3:10-13 '그 후에 내가 내 영을 만민에게 부어 주리니 너희 자녀들이 (A) 너희 늙은이는 (B) 너희 젊은이는 (C)…너희는 보습을 쳐서 칼을 만들지어다 (G)을 쳐서 창을 만들지어다…사면의 민족들아 너희는 속히 와서 모일지어다 여호와여 주의 (H) 그리로 내려오게 하옵소서 민족들은 일어나서 (I) 골짜기로 올라올지어다…'에서 빈칸이 맞는 것은?",o:["A: 꿈을 꾸며, B: 장래 일을 말할 것이며, C: 이상을 볼 것이며, D: 남은 자들, E: 피할 자 중에, F: 구원, G: 낫, H: 백성이, I: 여호사밧","A: 이상을 볼 것이며, B: 꿈을 꾸며, C: 장래 일을 말할 것이며, D: 피할 자, E: 내 백성 중에, F: 영, G: 낫, H: 군대가, I: 여호사밧","A: 이상을 볼 것이며, B: 꿈을 꾸며, C: 장래 일을 말할 것이며, D: 남은 자들, E: 내 백성 중에, F: 부름, G: 낫, H: 성도들로, I: 여호사밧","A: 장래 일을 말할 것이며, B: 꿈을 꾸며, C: 이상을 볼 것이며, D: 피할 자, E: 남은 자 중에, F: 부름, G: 낫, H: 용사들로, I: 여호사밧"],a:1},
{q:"여호와의 날에 대한 아모스의 말씀은?",o:["너희는 애곡할지어다 여호와의 날이 가까웠으니…(암 3:6)","여호와의 날이 이르리라…내가 이방 나라들을 모아 예루살렘과 싸우게 하리니…(암 8:7)","화 있을진저 여호와의 날을 사모하는 자여…그 날은 어둠이요 빛이 아니라…(암 5:18)","여호와의 큰 날이 가깝도다…그날은 분노의 날이요 환난과 고통의 날이요…(암 7:14)"],a:2},
{q:"아모스 9:8-10 '보라 주 여호와의 눈이 (A)을 주목하노니…(B)은 온전히 멸하지는 아니하리라…(C)을 (D) 체질하기를 체로 체질함 같이 하려니와 그 (E) 땅에 떨어지지 아니하리라 (F) 중에서 말하기를 화가 우리에게 미치지 아니하며…하는 모든 (G)은 칼에 죽으리라'에서 빈칸이 맞는 것은?",o:["A: 범죄한 백성, B: 통회하는 심령, C: 부정한 백성, D: 시온에서, E: 머리털이라도, F: 교만한 거민들, G: 안일한 자들","A: 교만한 입술, B: 내 백성, C: 패역한 자손, D: 타작 마당에서, E: 한 사람도, F: 범죄한 자손, G: 관원들","A: 패역한 족속, B: 이스라엘의 남은 자, C: 허망한 족속, D: 바람 속에서, E: 하나라도, F: 할례 받지 아니한 백성, G: 죄인","A: 범죄한 나라, B: 야곱의 집, C: 이스라엘 족속, D: 만국 중에서, E: 한 알갱이도, F: 내 백성, G: 죄인"],a:3},
{q:"아모스 9:11-14 '그 날에 내가 (A)을 일으키고…그들이 에돔의 (B)와 내 이름으로 일컫는 (C)을 기업으로 얻게 하리라…보라 날이 이를지라 그 때에 (D)가 곡식 추수하는 자의 뒤를 이으며 (E) 밟는 자가 씨 뿌리는 자의 뒤를 이으며 (F)은 단 포도주를 흘리며 작은 산들은 (G)…내가 내 백성 이스라엘이 사로잡힌 것을 돌이키리니 그들이 (H)을 건축하여 거주하며…'에서 빈칸이 맞는 것은?",o:["A: 시온의 허물어진 성읍, B: 흩어진 자, C: 백성, D: 경작하는 자, E: 포도를, F: 골짜기들, G: 기울리라, H: 무너진 터","A: 다윗의 무너진 장막, B: 남은 자, C: 만국, D: 파종하는 자, E: 포도를, F: 산들, G: 녹으리라, H: 황폐한 성읍","A: 이스라엘의 황폐한 성읍들, B: 포로된 자, C: 온 땅, D: 기경하는 자, E: 열매를, F: 언덕들, G: 흔들리리라, H: 견고한 성읍","A: 다윗의 거룩한 장막, B: 그 온 지경, C: 족속, D: 파종하는 자, E: 보리를, F: 산들, G: 넘치리라, H: 평원의 도시"],a:1},
{q:"오바댜서의 말씀이 아닌 것은?",o:["네가 독수리처럼 높이 오르며 별 사이에 깃들일지라도 내가 거기에서 너를 끌어내리리라 (옵 1:4)","네가 형제의 날 곧 그 재앙의 날에 방관할 것이 아니며…(옵 1:12)","에돔은 말하기를 우리가 무너뜨림을 당하였으나 황폐된 곳을 다시 쌓으리라 하거니와 나 만군의 여호와는 이르노라 그들은 쌓을지라도 나는 헐리라 (옵 1:8)","구원받은 자들이 시온 산에 올라와서 에서의 산을 심판하리니 나라가 여호와께 속하리라 (옵 1:21)"],a:2},
{q:"요나서의 말씀이 아닌 것은?",o:["여호와여 넉넉하오니 지금 내 생명을 거두시옵소서 나는 내 조상들보다 낫지 못하니이다 (욘 4:3)","여호와께서 이르시되 네가 성내는 것이 옳으냐 하시니라 (욘 4:4)","하나님이 뜻을 돌이키시고 그 진노를 그치사 우리가 멸망하지 않게 하시리라…(욘 3:9)","내가 말하기를 내가 주의 목전에서 쫓겨났을지라도 다시 주의 성전을 바라보겠다 하였나이다 (욘 2:4)"],a:0},
{q:"선지자 미가의 말씀이 아닌 것은?",o:["야곱아 내가 반드시 너희 무리를 다 모으며…보스라의 양 떼 같이 하며…(미2:12)","선견자가 부끄러워하며 술객이 수치를 당하여…오직 나는 여호와의 영으로 말미암아…(미 3:7-8)","야곱의 남은 자는 여러 나라 가운데와 많은 백성 가운데에 있으리니 그들은 수풀의 짐승들 중의 사자 같고… (미 5:8)","남은 자는 다시 아래로 뿌리를 박고 위로 열매를 맺으리니…만군의 여호와의 열심이 이를 이루시리이다 (미 7:3)"],a:3},
{q:"선지자 미가의 말씀이 아닌 것은?",o:["야곱의 남은 자는 많은 백성 가운데 있으리니 그들은 여호와께로부터 내리는 이슬 같고… (미 5:7)","베들레헴 에브라다야 너는 유다 족속 중에 작을지라도 이스라엘을 다스릴 자가 네게서 내게로 나올 것이라… (미 5:2)","여호와여 주의 백성 이스라엘의 남은 자를 구원하소서 하라 보라 나는 그들을 북쪽 땅에서 인도하며… (미 6:9)","나의 대적이여 나로 말미암아 기뻐하지 말지어다 나는 엎드러질지라도 일어날 것이요… (미 7:8)"],a:2},
{q:"미가서 7:16-20 '이르되 여러 나라가 보고 자기의 (A)을 부끄러워하여…주와 같은 신이 어디 있으리이까 주께서는 (D)와 그 기업에 남은 자의 (E)을 사유하시며 (F)을 기뻐하시므로 진노를 오래 품지 아니하시나이다 다시 우리를 (G) 우리의 죄악을 (H) 우리의 모든 죄를 깊은 바다에 던지시리이다…'에서 빈칸이 맞는 것은?",o:["A: 권세, B: 두려워하며, C: 떨며, D: 허물, E: 죄악, F: 긍휼, G: 불쌍히 여기셔서, H: 온전히 사하시고, I: 시온, J: 인애","A: 죄악, B: 구푸려, C: 떨며, D: 패역, E: 범죄, F: 자비, G: 긍휼히 여기셔서, H: 손으로 덮으시고, I: 이스라엘, J: 진리","A: 세력, B: 떨며, C: 두려워하며, D: 죄악, E: 허물, F: 인애, G: 불쌍히 여기셔서, H: 발로 밟으시고, I: 야곱, J: 성실","A: 허물, B: 구르며, C: 두려워하며, D: 범죄, E: 패역, F: 성실, G: 긍휼히 여기셔서, H: 영원히 사하시고, I: 열방, J: 복"],a:2},
{q:"미가서 4:10-13 '딸 시온이여 해산하는 여인처럼 힘들여 낳을지어다…(A) 여호와께서 거기서 너를 네 원수들의 손에서 속량하여 내시리라 이제 (B) 모여서 너를 치며 이르기를 시온이 (C)…그들이 (D)을 알지 못하며 (E)을 깨닫지 못한 것이라 여호와께서 (F)을 타작 마당에 모음 같이 그들을 모으셨나니 딸 시온이여 (G)…'에서 빈칸이 맞는 것은?",o:["A: 자유를 얻으리니, B: 너의 대적들이, C: 수치를 당하며, D: 여호와의 계획, E: 그의 뜻, F: 추수한 곡식, G: 두려워 말지어다, H: 놋 같게, I: 무쇠 같게, J: 여러 민족","A: 구원을 얻으리니, B: 많은 이방 사람들이, C: 더럽게 되며, D: 여호와의 뜻, E: 그의 계획, F: 곡식 단, G: 일어나서 칠지어다, H: 무쇠 같게, I: 놋 같게, J: 여러 백성","A: 영광을 얻으리니, B: 여러 백성들이, C: 버림을 당하며, D: 여호와의 섭리, E: 그의 보응, F: 보리와 밀, G: 일어나서 밟을지어다, H: 강하게, I: 견고히, J: 여러 민족","A: 놓임을 받으리니, B: 너의 대적들이, C: 능욕을 당하며, D: 여호와의 공의, E: 그의 심판, F: 추수한 단, G: 깨어 일어날지어다, H: 견고하게, I: 강하게, J: 여러 백성"],a:1},
{q:"선지자 미가의 말씀이 아닌 것은?",o:["사람아 주께서 선한 것이 무엇임을 네게 보이셨나니…여호와께서 네게 구하시는 것은 오직 정의를 행하며 인자를 사랑하며 겸손하게 네 하나님과 함께 행하는 것이 아니냐 (미 6:8)","그가 열방 사이에 판단하시며 많은 백성을 판결하시리니 무리가 그들의 칼을 쳐서 보습을 만들고… (미 4:3)","너희가 선을 미워하고 악을 기뻐하여 내 백성의 가죽을 벗기고… (미 3:2-3)","만민이 각각 자기의 신의 이름을 의지하여 행하되 오직 우리는 우리 하나님 여호와의 이름을 의지하여 영원히 행하리로다 (미 4:5)"],a:1},
{q:"선지자 나훔의 말씀이 아닌 것은?",o:["이는 마술에 능숙한 미모의 음녀가 많은 음행을 함이라… (나 3:4)","여호와는 노하기를 더디하시며 권능이 크시며…여호와의 길은 회오리바람과 광풍에 있고… (나 1:3)","잊어버린 바 되었던 너 음녀여 수금을 가지고 성읍에 두루 다니며… (나 1:16)","네 상처는 고칠 수 없고 네 부상은 중하도다… (나 3:19)"],a:2},
{q:"나훔서 예언 말씀에서 '만군의 여호와의 말씀에 내가 네 대적이 되어 네 (A)을 불살라…앗수르 왕이여 네 (H)이 자고 네 (I)은 누워 쉬며 네 (J)은 산들에 흩어지나 그들을 모을 사람이 없도다'에서 빈칸이 맞는 것은?",o:["A: 마병들, B: 젊은 군사들, C: 왕들, D: 군대, E: 장수들, F: 방백들, G: 앗수르, H: 귀족, I: 목자, J: 백성","A: 전차들, B: 장수들, C: 파견자, D: 장수들, E: 군대, F: 마병들, G: 바벨론, H: 백성, I: 귀족, J: 종들","A: 병거들, B: 눈에 귀한 자들, C: 왕들, D: 상품들, E: 상고들, F: 방백들, G: 바벨론, H: 목자들, I: 귀족들, J: 백성","A: 병거들, B: 젊은 사자들, C: 파견자, D: 상인, E: 방백, F: 장수들, G: 앗수르, H: 목자, I: 귀족, J: 백성"],a:3},
{q:"선지자 하박국의 말씀이 아닌 것은?",o:["주께서는 눈이 정결하시므로 악을 차마 보지 못하시며…어찌하여 거짓된 자들을 방관하시며… (합 1:13)","보라 그의 마음은 교만하며 그 속에서 정직하지 못하나 의인은 그의 믿음으로 말미암아 살리라 (합 2:4)","민족들이 불탈 것으로 수고하는 것과 나라들이 헛된 일로 피곤하게 되는 것이 만군의 여호와께로 말미암음이 아니냐 (합 2:13)","나의 발을 암사슴 발 같게 하시며 나를 나의 높은 곳에 세우시며 내 손을 가르쳐 싸우게 하시니… (합 3:19)"],a:3},
{q:"선지자 하박국의 말씀은?",o:["이 사람이 땅을 진동시키며 열국을 놀라게 하며…(합 1:16)","네가 여러 나라를 노략하였으므로…이는 네가 사람의 피를 흘렸음이요… (합 2:8)","화 있을진저 피의 성이여 그 안에는 거짓이 가득하고… (합 2:12)","만군의 여호와라 일컫는 왕이 이와 같이 말씀하시되 내가 그 고관들과…취하게 하리니 그들이 영원히 잠들어 깨어나지 못하리라 (합 3:8)"],a:1},
{q:"하박국 3:16-18 '내가 들었으므로 (A) 흔들렸고…비록 (E) 무성하지 못하며 (F) 열매가 없으며 (G) 소출이 없으며 밭에 먹을 것이 없으며 우리에 양이 없으며 외양간에 소가 없을지라도 나는 여호와로 말미암아 (H) 나의 (I) 하나님으로 말미암아 기뻐하리로다'에서 빈칸이 맞는 것은?",o:["A: 내 중심이, B: 내 영혼이, C: 혼돈이, D: 내 발이, E: 무화과나무가, F: 포도나무에, G: 감람나무에, H: 찬양하며, I: 능력의","A: 내 심장이, B: 내 콩팥이, C: 두려움이, D: 내 영혼이, E: 무화과나무가, F: 감람나무에, G: 포도나무에, H: 감사하며, I: 생명의","A: 내 창자가, B: 내 입술이, C: 썩이는 것이, D: 내 몸은, E: 무화과나무가, F: 포도나무에, G: 감람나무에, H: 즐거워하며, I: 구원의","A: 땅의 높은 곳이, B: 스올까지, C: 태우는 것이, D: 내 온 몸이, E: 무화과나무가, F: 감람나무에, G: 포도나무에, H: 안심하며, I: 만군의"],a:2},
{q:"선지자 스바냐의 말씀이 아닌 것은?",o:["내가 유다와 예루살렘의 모든 주민들 위에 손을 펴서 남아 있는 바알을 그 곳에서 멸절하며… (습 1:4)","그 마음을 금강석 같게 하여 율법과 만군의 여호와가 그의 영으로 옛 선지자들을 통하여 전한 말을 듣지 아니하므로… (습 2:7)","그 때에 내가 예루살렘에서 찌꺼기 같이 가라앉아서 마음속에 스스로 이르기를 여호와께서는 복도 내리지 아니하시며…(습 1:12)","그 때에 내가 여러 백성의 입술을 깨끗하게 하여 그들이 다 여호와의 이름을 부르며…(습 3:9)"],a:1},
{q:"스바냐 3:5,11-13,17 '그 (A) 계시는 여호와는 의로우사…이스라엘의 남은 자는 (F) 아니하며 거짓을 말하지 아니하며…너의 하나님 여호와가 너의 (A) 계시니…그가 너로 말미암아 (G)을 이기지 못하시며 너를 (H) 사랑하시며 너로 말미암아 즐거이 부르며 기뻐하시리라 하리라'에서 빈칸이 맞는 것은?",o:["A: 가운데에, B: 아침마다, C: 공의, D: 수치, E: 교만, F: 악을 행하지, G: 기쁨, H: 잠잠히","A: 속에, B: 새벽마다, C: 심판, D: 책망, E: 반역, F: 범죄하지, G: 기쁨, H: 은밀히","A: 위에, B: 아침마다, C: 교훈, D: 수치, E: 완악, F: 맹세하지, G: 기쁨, H: 영원히","A: 우편에, B: 새벽마다, C: 공의, D: 책망, E: 교만, F: 죄를 범하지, G: 기쁨, H: 고요히"],a:0},
{q:"선지자 학개의 말씀이 아닌 것은?",o:["스룹바벨의 손이 이 성전의 기초를 놓았은즉 그의 손이 또한 그 일을 마치리라 하셨나니 (학 1:7)","너희가 많은 것을 바랐으나 도리어 적었고…내 집은 황폐하였으되 너희는 각각 자기의 집을 짓기 위하여 빨랐음이라 (학 1:9)","너희가 애굽에서 나올 때에 내가 너희와 언약한 말과 나의 영이 계속하여 너희 가운데에 머물러 있나니…(학 2:5)","이 성전의 나중 영광이 이전 영광보다 크리라 만군의 여호와의 말이니라…(학 2:9)"],a:0},
{q:"학개 2:7,21-23 '또한 모든 나라를 (A) 것이며 모든 나라의 (B) 이르리니 내가 이 성전에 (C) 충만하게 하리라…(F)의 아들 내 종 (G)아 여호와가 말하노라 그 날에 내가 너를 세우고 너를 (H) 삼으리니 이는 내가 너를 (I)'에서 빈칸이 맞는 것은?",o:["A: 진동시킬, B: 보배가, C: 영광이, D: 보좌를, E: 세력을, F: 스알디엘, G: 스룹바벨, H: 인장으로, I: 택하였음이니라","A: 엎을, B: 왕들이, C: 보화를, D: 권세를, E: 마병을, F: 스알디엘, G: 스룹바벨, H: 지팡이로, I: 세웠음이라","A: 진동시킬, B: 영광이, C: 보배가, D: 지경을, E: 세력을, F: 스룹바벨, G: 스알디엘, H: 왕으로, I: 택하였음이니라","A: 뒤흔들, B: 보배가, C: 영광이, D: 권세를, E: 지경을, F: 스룹바벨, G: 스알디엘, H: 인장으로, I: 택하였음이라"],a:0},
{q:"선지자 스가랴의 말씀이 아닌 것은?",o:["그 뿔들이 유다를 흩뜨려서…이 대장장이들이 와서 그것들을 두렵게 하고… (슥 1:21)","만군의 여호와가 말하노라 내가 너 여호수아 앞에 세운 돌을 보라 한 돌에 일곱 눈이 있느니라… (슥 3:9)","여호와께서 스룹바벨에게 하신 말씀이 이러하니라 만군의 여호와께서 말씀하시되 이는 힘으로 되지 아니하며…(슥 4:6)","나를 데리시고 거기에 이르시니 모양이 놋 같이 빛난 사람 하나가 손에 삼줄과 측량하는 장대를 가지고 문에 서 있더니 (슥 2:5)"],a:3},
{q:"선지자 스가랴의 말씀이 아닌 것은?",o:["베들레헴 에브라다야 너는 유다 족속 중에 작을지라도 이스라엘을 다스릴 자가 네게서 내게로 나올 것이라… (슥 7:2)","이 성읍 주민이 저 성읍에 가서 이르기를 우리가 속히 가서 만군의 여호와를 찾고…(슥 8:21)","여호와께서 내게 이르시되 그들이 나를 헤아린 바 그 삯을 토기장이에게 던지라 하시기로…(슥 11:13)","내가 다윗의 집과 예루살렘 주민에게 은총과 간구하는 심령을 부어 주리니 그들이 그 찌른 바 그를 바라보고… (슥 12:10)"],a:0},
{q:"선지자 스가랴의 말씀이 아닌 것은?",o:["그가 이르되 이는 악이라 하고 그 여인을 에바 속으로 던져 넣고 납 조각을 에바 아귀 위에 던져 덮더라 (슥 5:8)","그 날에 죄와 더러움을 씻는 샘이 다윗의 족속과 예루살렘 주민을 위하여 열리리라…(슥 13:1-2)","그 사방의 합계는 만 팔천 척이라 그 날 후로는 그 성읍의 이름을 여호와삼마라 하리라 (슥 14:12)","그 날에는 말 방울에까지 여호와께 성결이라 기록될 것이라…(슥 14:20)"],a:2},

const ALL=[...OT.map((q,i)=>({...q,sec:'OT',num:i+1})),...NT.map((q,i)=>({...q,sec:'NT',num:i+1}))];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(mode,custom){
  clearSave();
  document.getElementById('start-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  const qs=document.getElementById('quiz-screen');
  qs.style.display='flex';
  queue=custom?[...custom]:mode==='rnd'?shuffle([...ALL]):[...ALL];
  qIdx=0;okSet=new Set();noSet=new Set();answered=false;isRetry=!!custom;
  renderQ();
}
function renderQ(){
  if(qIdx>=queue.length){showResult();return;}
  answered=false;
  const q=queue[qIdx];
  const total=queue.length;
  const pct=Math.round(qIdx/total*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('q-num').textContent=(qIdx+1)+' / '+total;
  document.getElementById('cnt-ok').textContent=okSet.size;
  document.getElementById('cnt-no').textContent=noSet.size;
  const badge=document.getElementById('sec-badge');
  badge.textContent=q.sec==='OT'?'구약 '+q.num+'번':'신약 '+q.num+'번';
  badge.className='sec-badge '+(q.sec);
  document.getElementById('q-text').textContent=q.q;
  const fb=document.getElementById('feedback');
  fb.className='feedback-box';fb.textContent='';
  document.getElementById('btn-next').style.display='none';
  const opts=document.getElementById('options');
  opts.innerHTML='';
  const letters=['①','②','③','④'];
  q.o.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-letter">${letters[i]}</span><span>${o}</span>`;
    btn.onclick=()=>pick(i,q.a,btn,q);
    opts.appendChild(btn);
  });
  document.getElementById('q-body').scrollTop=0;
}

function pick(i,ans,btn,q){
  if(answered)return;
  answered=true;
  const origIdx=ALL.indexOf(q);
  const opts=document.querySelectorAll('.opt-btn');
  opts.forEach(b=>b.disabled=true);
  const letters=['①','②','③','④'];
  const fb=document.getElementById('feedback');
  if(i===ans){
    btn.classList.add('correct');
    okSet.add(origIdx);noSet.delete(origIdx);
    fb.className='feedback-box ok show';
    fb.textContent='✓ 정답입니다!';
  } else {
    btn.classList.add('wrong');
    opts[ans].classList.add('reveal');
    noSet.add(origIdx);okSet.delete(origIdx);
    fb.className='feedback-box no show';
    fb.textContent='✗ 오답입니다. 정답: '+letters[ans]+' '+q.o[ans];
  }
  document.getElementById('btn-next').style.display='block';
  document.getElementById('cnt-ok').textContent=okSet.size;
  document.getElementById('cnt-no').textContent=noSet.size;

  saveState();
}
function nextQ(){qIdx++;saveState();renderQ();}

function endEarly(){showResult();}

function showResult(){
  clearSave();
  document.getElementById('quiz-screen').style.display='none';
  const rs=document.getElementById('result-screen');
  rs.style.display='block';
  const total=okSet.size+noSet.size;
  const ok=okSet.size;
  const pct=total>0?Math.round(ok/total*100):0;
  document.getElementById('res-title').textContent=isRetry?'오답 재도전 완료!':'퀴즈 완료!';
  document.getElementById('res-sub').textContent='수고하셨습니다 🎉';
  document.getElementById('r-total').textContent=total;
  document.getElementById('r-ok').textContent=ok;
  document.getElementById('r-no').textContent=noSet.size;
  document.getElementById('pct-text').textContent=pct+'%';
  const arc=289*(1-pct/100);
  document.getElementById('ring-arc').setAttribute('stroke-dashoffset',arc.toFixed(1));
  const btn=document.getElementById('btn-retry-wrong');
  btn.disabled=noSet.size===0;
  btn.textContent=noSet.size>0?`오답 ${noSet.size}문항 다시 풀기`:'오답 없음';
}

function retryWrong(){
  const wrong=[...noSet].map(i=>ALL[i]);
  isRetry=true;
  startQuiz(null,wrong);
}

function restart(){
  clearSave();
  document.getElementById('result-screen').style.display='none';
  const ss=document.getElementById('start-screen');
  ss.style.display='flex';
  ss.style.flexDirection='column';
  checkResume();
}


function checkResume() {
  const s = loadSave();
  const banner = document.getElementById('resume-banner');
  if (s && s.qIdx < s.queueIds.length) {
    banner.style.display = 'flex';
    document.getElementById('resume-info').textContent =
      (s.qIdx) + '번까지 풀었습니다 (정답 ' + s.okArr.length + '개 / 오답 ' + s.noArr.length + '개)';
    banner._saved = s;
  } else {
    banner.style.display = 'none';
  }
}
window.addEventListener('load', checkResume);

</script>
</body>
</html>
